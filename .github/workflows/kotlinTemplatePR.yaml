name: kotlin-template Pull request workflow

on: [pull_request]

jobs:
  kotlin-template-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15.5-alpine
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      service_name: ${{ github.event.repository.name }}
      AWS_REGION: eu-west-1
      ENV_NAME: CI

    permissions:
      id-token: write
      contents: write
      issues: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout ${{ github.event.repository.name }} repo
        uses: actions/checkout@v4

      - name: java version
        id: java_ver
        run: echo "java_ver=$(grep service.image gradle.properties | sed 's/.*\:jdk\([0-9]*\).*/\1/')" >> $GITHUB_ENV

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.java_ver }}
          distribution: 'temurin'

      - name: Gradle setup
        uses: hibobio/reusable-workflows/actions/gradle-setup@master

      - name: Gradle build cache restore
        uses: actions/cache/restore@v4
        with:
          key: ${{ env.service_name }}-${{ env.java_ver }}-classes-${{ github.sha }}
          path: |
            **/build/classes
            **/build/kotlin
            **/build/generated
            **/build/src
            *.gradle*
            **/gradle-wrapper.properties
          restore-keys: |
            ${{ env.service_name }}-${{ env.java_ver }}-classes-${{ github.event.pull_request.base.sha }}
            ${{ env.service_name }}-${{ env.java_ver }}-classes-

      - name: Configure AWS credentials for ECR prod
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.HIBOB_ECR_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.HIBOB_ECR_SECRET_ACCESS_KEY }}

      - name: Docker login ECR prod
        uses: docker/login-action@v3.2.0
        with:
          registry: ${{ secrets.ECR_REGISTRY }}

      - name: Run flyway migration
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          DB_URL=${DB_URL} dockerImage=${{ secrets.ECR_REGISTRY }}/devops-tools:flyway-gradle-jdk21 ./flyway/runFlyway.sh flywayMigrate -PskipFlywayCallbacks=true

      - name: Configure AWS credentials for Gradle Build with tests
        uses: aws-actions/configure-aws-credentials@master
        with:
          role-to-assume: arn:aws:iam::581316237707:role/hibob-dev-local-eu-west-1-generic
          aws-region: ${{ env.AWS_REGION }}

      - name: Run gradle build
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: ./gradlew --no-daemon -Porg.gradle.java.installations.auto-download=false --console=plain --continue build

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ./**/build/test-results/**/*.xml
          check_name: Test Results
          comment_mode: off
          compare_to_earlier_commit: false
